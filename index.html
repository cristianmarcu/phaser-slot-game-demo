<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <title>Lucky Reels - Phaser Slot Game Demo</title>

    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #070006;
        overflow: hidden;
        touch-action: none;
      }

      body {
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #game-wrapper {
        width: 100vw;
        height: 100dvh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #070006;
        overflow: hidden;
      }

      #game {
        width: min(100vw, calc(100dvh * 16 / 9));
        height: min(100dvh, calc(100vw * 9 / 16));
        aspect-ratio: 16 / 9;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #game canvas {
        width: 100% !important;
        height: 100% !important;
        display: block;
      }

      @media (orientation: portrait) {
        #game-wrapper::before {
          content: "Rotate your device for the best experience";
          position: fixed;
          top: 18px;
          left: 50%;
          transform: translateX(-50%);
          z-index: 10;
          padding: 8px 14px;
          border: 1px solid #ffd700;
          border-radius: 999px;
          background: rgba(15, 0, 8, 0.9);
          color: #ffe9a6;
          font-family: Arial, sans-serif;
          font-size: 13px;
          font-weight: bold;
          text-align: center;
          pointer-events: none;
        }
      }
    </style>
  </head>

  <body>
    <div id="game-wrapper">
      <div id="game"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
